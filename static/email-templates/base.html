{{ define "header" }}
<!doctype html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1" />
        <base target="_blank">

        <style>
            body {
                background-color: #f2f3f5;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, Helvetica, Arial, sans-serif;
                font-size: 15px;
                line-height: 26px;
                margin: 0;
                color: #111318;
            }

            h1, h2, h3 {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, Helvetica, Arial, sans-serif;
                font-weight: 700;
                letter-spacing: -0.02em;
                color: #111318;
            }

            .band {
                background-color: #6d6af8;
                padding: 22px 30px;
                max-width: 525px;
                margin: 0 auto;
                border-radius: 5px 5px 0 0;
                text-align: center;
            }
            .wordmark {
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                font-size: 13px;
                color: #ffffff;
                vertical-align: middle;
            }
            .wordmark img {
                height: 22px;
                width: 22px;
                vertical-align: middle;
                margin-right: 8px;
                border-radius: 999px;
            }

            .wrap {
                background-color: #ffffff;
                padding: 30px;
                max-width: 525px;
                margin: 0 auto;
                border-radius: 0 0 5px 5px;
            }

            .footer {
                text-align: center;
                font-size: 12px;
                color: #69707d;
            }
                .footer a {
                    color: #69707d;
                }

            .gutter {
                padding: 30px;
            }
            .button {
                background: #6d6af8;
                color: #fff !important;
                display: inline-block;
                border-radius: 999px;
                padding: 10px 30px;
                text-align: center;
                text-decoration: none;
                font-weight: 700;
            }
            .button:hover {
                background: #5754e0;
                color: #fff;
            }
            img {
                max-width: 100%;
            }

            a {
                color: #6d6af8;
            }
                a:hover {
                    color: #111318;
                }
            @media screen and (max-width: 600px) {
                .band, .wrap {
                    max-width: auto;
                }
                .gutter {
                    padding: 10px;
                }
            }
        </style>
    </head>
<body style="background-color: #f2f3f5;">
    <div class="gutter">&nbsp;</div>
    <div class="band">
        <span class="wordmark">
            {{ if ne LogoURL "" }}<img src="{{ LogoURL }}" alt="" />{{ end }}Non Slop AI
        </span>
    </div>
    <div class="wrap">
{{ end }}

{{ define "footer" }}
    </div>
    <div class="gutter">&nbsp;</div>
</body>
</html>
{{ end }}
