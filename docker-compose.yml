# listmonk stack. Used unchanged in dev and prod — environment differences
# come entirely from .env values and which profile is active, not separate
# files. Set COMPOSE_PROFILES=dev or COMPOSE_PROFILES=prod in .env; the run
# command is always just: docker compose up -d
#
#   dev profile:  adds Mailpit (catches mail locally, UI at :8025) and MinIO
#                 (S3-compatible media storage, mirrors prod's Cloudflare R2)
#   prod profile: adds Caddy (TLS termination for LISTMONK_HOSTNAME)
#
# See .env.example for the variables this file reads.

x-db-credentials: &db-credentials
  POSTGRES_USER: &db-user listmonk
  POSTGRES_PASSWORD: &db-password ${LISTMONK_DB_PASSWORD:-listmonk}
  POSTGRES_DB: &db-name listmonk

services:
  app:
    image: listmonk/listmonk:latest
    restart: unless-stopped
    hostname: ${LISTMONK_HOSTNAME:-listmonk.localhost}
    ports:
      - "9000:9000"
    depends_on:
      db:
        condition: service_healthy
    # --install --idempotent runs schema setup only on a fresh DB;
    # --upgrade applies any pending migrations on every start.
    # --static-dir overlays our customized templates (email base wrapper,
    # to drop the "Powered by listmonk" footer; opt-in email, to link
    # straight to our own /api/confirm instead of listmonk's own
    # click-through page) on top of listmonk's embedded defaults — anything
    # not present under static/ falls back to the built-in version.
    # Deliberately scoped to email-templates/ only; see
    # static/email-templates/base.html for why we're not overlaying
    # static/public/ too.
    #
    # The mounted static/ dir is read-only, so we copy it to a scratch dir
    # first and substitute __SITE_URL__ (the opt-in email's confirm link
    # target) with NEXT_PUBLIC_SITE_URL — the one place this compose file
    # needs to know the Next.js site's own URL, since Go templates can't
    # read env vars themselves.
    command: [sh, -c, "cp -r /listmonk-static /tmp/listmonk-static && find /tmp/listmonk-static -type f -exec sed -i \"s|__SITE_URL__|${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}|g\" {} + && ./listmonk --install --idempotent --yes --config '' --static-dir=/tmp/listmonk-static && ./listmonk --upgrade --yes --config '' --static-dir=/tmp/listmonk-static && ./listmonk --config '' --static-dir=/tmp/listmonk-static"]
    environment:
      LISTMONK_app__address: 0.0.0.0:9000
      LISTMONK_db__user: *db-user
      LISTMONK_db__password: *db-password
      LISTMONK_db__database: *db-name
      LISTMONK_db__host: db
      LISTMONK_db__port: 5432
      LISTMONK_db__ssl_mode: disable
      TZ: Etc/UTC
      # If set, the super admin is created automatically on first boot.
      # Leave unset locally and create it through the web UI instead.
      LISTMONK_ADMIN_USER: ${LISTMONK_ADMIN_USER:-}
      LISTMONK_ADMIN_PASSWORD: ${LISTMONK_ADMIN_PASSWORD:-}
    volumes:
      - listmonk-uploads:/listmonk/uploads
      - ./static:/listmonk-static:ro

  db:
    image: postgres:18-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      <<: *db-credentials
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U listmonk"]
      interval: 10s
      timeout: 5s
      retries: 6
    volumes:
      # Postgres 18's image expects the volume at /var/lib/postgresql (not
      # .../data as in 17 and earlier) — it places data in a version-specific
      # subdirectory itself now, and refuses to start against the old mount
      # point convention as a safety check against silently reading
      # wrong-version data.
      - listmonk-data:/var/lib/postgresql

  # Fake SMTP server + web UI for local dev — point listmonk's SMTP settings
  # at it (host "mailpit", port 1025, no auth/TLS) to see real opt-in /
  # campaign emails rendered without sending anything out. UI at :8025.
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    profiles: ["dev"]
    ports:
      - "8025:8025"
      - "1025:1025"

  # S3-compatible media storage for local dev — mirrors prod's Cloudflare R2
  # (listmonk's S3 media provider works unchanged against either). Console
  # UI at :9003 (login with the credentials below). API on :9002 host-side
  # to avoid clashing with listmonk's own :9000.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    profiles: ["dev"]
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 12

  # One-shot: creates the dev media bucket and makes it public-read, then
  # exits. MinIO itself has no "create this bucket on boot" option.
  minio-init:
    image: minio/mc:latest
    profiles: ["dev"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["sh", "-c"]
    command:
      - >
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
        mc mb --ignore-existing local/${MINIO_BUCKET:-nonslop-dev} &&
        mc anonymous set download local/${MINIO_BUCKET:-nonslop-dev}

  # Terminates TLS for LISTMONK_HOSTNAME and proxies to the app — no
  # Caddyfile needed for a single-domain setup.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles: ["prod"]
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    command: ["caddy", "reverse-proxy", "--from", "${LISTMONK_HOSTNAME}", "--to", "app:9000"]
    volumes:
      - caddy-data:/data
      - caddy-config:/config

volumes:
  listmonk-data:
  listmonk-uploads:
  minio-data:
  caddy-data:
  caddy-config:
